<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hero IO — App Details</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="site">
      <header class="site-header" role="banner">
        <div class="header-inner container">
          <a href="index.html" class="logo">
            <img src="assets/logo.png" alt="HERO.IO logo" class="logo-icon" />
            <div class="brand">HERO.IO</div>
          </a>

          <nav class="nav" role="navigation" aria-label="Main">
            <a href="index.html" class="nav-link">Home</a>
            <a href="apps.html" class="nav-link">Apps</a>
            <a href="installation.html" class="nav-link">Installation</a>
          </nav>

          <a class="btn contribute" href="#" target="_blank" rel="noopener">
            <i class="fa-brands fa-github"></i>
            Contribute
          </a>
        </div>
      </header>

      <main class="container">
        <div id="appContent">
          <div class="app-details-header" id="appDetailsHeader"></div>

          <div class="ratings-section">
            <h2>Ratings</h2>
            <div class="ratings-chart">
              <div class="ratings-bar-list" id="ratingsBreakdown"></div>
              <div class="rating-x-axis">
                <span class="start">0</span>
                <span>3000</span>
                <span>6000</span>
                <span>9000</span>
                <span class="end">12000</span>
              </div>
            </div>
          </div>

          <div class="description-section">
            <h2>Description</h2>
            <div id="appDescription"></div>
          </div>
        </div>

        <div id="appNotFound" class="error-page" style="display: none">
          <img
            src="assets/App-Error.png"
            alt="App Not Found Illustration"
            class="app-not-found-image"
          />
          <h1>OPPS!! APP NOT FOUND</h1>
          <p>
            The App you are requesting is not found on our system. please try
            another apps
          </p>
          <a
            href="apps.html"
            class="btn"
            style="background: var(--secondary-color)"
            >Go Back!</a
          >
        </div>
      </main>

      <footer class="site-footer" style="margin-top: 40px">
        <div class="container footer-inner">
          <div class="footer-logo">
            <img
              src="assets/logo.png"
              alt="HERO.IO logo"
              style="width: 20px; height: 20px"
            />
            HERO.IO
          </div>
          <div class="footer-text">Copyright © 2025 · All right reserved</div>
          <div class="social-links">
            <a href="#" aria-label="LinkedIn"
              ><i class="fab fa-linkedin"></i
            ></a>
            <a href="#" aria-label="Instagram"
              ><i class="fab fa-instagram"></i
            ></a>
            <a href="#" aria-label="Facebook"
              ><i class="fab fa-facebook"></i
            ></a>
          </div>
        </div>
      </footer>
    </div>

    <script src="data.js"></script>
    <script src="utils.js"></script>
    <script>
      function renderAppDetails() {
        showLoading(true);
        const urlParams = new URLSearchParams(window.location.search);
        const appId = parseInt(urlParams.get("id"));
        const app = window.appsData.find((a) => a.id === appId);

        const appContent = document.getElementById("appContent");
        const appNotFound = document.getElementById("appNotFound");

        if (!app) {
          appContent.style.display = "none";
          appNotFound.style.display = "block";
          showLoading(false);
          return;
        }

        appContent.style.display = "block";
        appNotFound.style.display = "none";
        document.title = `Hero IO — ${app.title}`;

        // Check if installed
        const isInstalled = getInstalledApps().some((a) => a.id === app.id);

        // Render Header
        document.getElementById("appDetailsHeader").innerHTML = `
                <div class="app-details-icon-container">
                    <img src="${app.image}" alt="${app.title} icon" class="app-details-icon" onerror="this.src='assets/placeholder.png'">
                </div>
                <div class="app-details-info">
                    <h1>${app.title}</h1>
                    <p>Developed by <strong>${app.companyName}</strong></p>
                    <div class="app-stats-grid">
                        <div class="app-stat-item">
                            <div class="app-stat-value">${formatDownloads(app.downloads)}</div>
                            <div class="app-stat-label">Downloads</div>
                        </div>
                        <div class="app-stat-item">
                            <div class="app-stat-value">${app.ratingAvg}</div>
                            <div class="app-stat-label">Average Ratings</div>
                        </div>
                        <div class="app-stat-item">
                            <div class="app-stat-value">${formatDownloads(app.reviews)}</div>
                            <div class="app-stat-label">Total Reviews</div>
                        </div>
                    </div>
                    <button id="installBtn" class="btn install-btn-lg ${isInstalled ? "installed" : ""}" ${isInstalled ? "disabled" : ""}>
                        ${isInstalled ? "Installed" : `Install Now (${app.size} MB)`}
                    </button>
                </div>
            `;

        // Install Button Logic
        document
          .getElementById("installBtn")
          .addEventListener("click", function () {
            if (isInstalled) return;

            const installedApps = getInstalledApps();
            if (!installedApps.some((a) => a.id === app.id)) {
              installedApps.push(app);
              saveInstalledApps(installedApps);

              // Update button state
              this.textContent = "Installed";
              this.disabled = true;
              this.classList.add("installed");

              showToast("App installed successfully!");
            }
          });

        // Render Ratings Breakdown
        const scaledRatings = getScaledRatings(app);
        const breakdownHtml = scaledRatings
          .map((r) => {
            // Use Font Awesome star icons
            const starIcon =
              '<i class="fa-solid fa-star" style="color: var(--rating-color);"></i>';
            return `
                    <div class="rating-row">
                        <div class="star-label">${r.name.replace(" star", "")} ${starIcon}</div>
                        <div class="rating-bar-container">
                            <div class="rating-bar" style="width: ${r.percentage}%;"></div>
                        </div>
                    </div>
                `;
          })
          .reverse()
          .join(""); // Reverse to show 5 star at the top

        document.getElementById("ratingsBreakdown").innerHTML = breakdownHtml;

        // Render Description
        // Split the description by '. ' to create paragraphs for better layout
        document.getElementById("appDescription").innerHTML = app.description
          .split(". ")
          .map((p) => {
            if (p.trim().length > 0) return `<p>${p}.</p>`;
            return "";
          })
          .join("");

        showLoading(false);
      }

      document.addEventListener("DOMContentLoaded", renderAppDetails);
    </script>
  </body>
</html>
